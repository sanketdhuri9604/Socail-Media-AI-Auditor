name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN is not set. Skipping HF sync."
            exit 0
          fi

          HF_USERNAME=$(python - <<'PY'
import json
import os
import urllib.request

token = os.environ.get("HF_TOKEN", "")
req = urllib.request.Request(
    "https://huggingface.co/api/whoami-v2",
    headers={"Authorization": f"Bearer {token}"},
)
try:
    with urllib.request.urlopen(req, timeout=20) as r:
        payload = json.loads(r.read().decode("utf-8"))
        username = payload.get("name") or payload.get("fullname") or payload.get("username")
        if not username:
            raise RuntimeError("No username found in whoami response")
        print(username)
except Exception as e:
    raise SystemExit(f"Unable to resolve HF username from token: {e}")
PY
)

          if [ -z "$HF_USERNAME" ]; then
            echo "Resolved HF username is empty. Skipping HF sync."
            exit 0
          fi

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/Sanketdhuri9604/social-media-auditor-env
          echo "Last sync: $(date -u)" > .hf_sync_timestamp
          git add .hf_sync_timestamp
          git commit -m "chore: force HF rebuild $(date -u)" || true
          git push hf main --force