name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: monikdiwani
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN is not set. Skipping HF sync."
            exit 0
          fi

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/Sanketdhuri9604/social-media-auditor-env.git
          echo "Last sync: $(date -u)" > .hf_sync_timestamp
          git add .hf_sync_timestamp
          git commit -m "chore: force HF rebuild $(date -u)" || true
          git push hf main --force