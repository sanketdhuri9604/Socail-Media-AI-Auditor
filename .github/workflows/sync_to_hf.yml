name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN is not set. Skipping HF sync."
            exit 0
          fi

          HF_AUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" https://huggingface.co/api/whoami-v2 || true)
          if [ "$HF_AUTH_STATUS" != "200" ]; then
            echo "HF_TOKEN is unauthorized (HTTP $HF_AUTH_STATUS). Skipping HF sync."
            exit 0
          fi

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote remove hf 2>/dev/null || true
          git remote add hf https://oauth2:$HF_TOKEN@huggingface.co/spaces/Sanketdhuri9604/social-media-auditor-env
          echo "Last sync: $(date -u)" > .hf_sync_timestamp
          git add .hf_sync_timestamp
          git commit -m "chore: force HF rebuild $(date -u)" || true
          git push hf main --force || {
            echo "HF sync push failed. Skipping without failing workflow."
            exit 0
          }