name: social-media-auditor-env
version: 4.0.0
description: >
  OpenEnv-compatible RL environment for auditing AI-generated social media
  moderation outputs. Agents evaluate posts across hallucination, bias,
  alignment, and memory dimensions with weighted partial-credit grading.
author: sanket

graders:
  default:
    enabled: true
    type: server_binary_grader
    implementation: server/grader.py:grade
    score_range: [0.001, 0.999]
    description: >
      Weighted partial-credit grader. Evaluates 5 independent dimensions
      (hallucination 25%, alignment 25%, bias 20%, memory 15%, verdict 15%)
      to produce shaped rewards between 0.14 and 0.86.

tasks:
  - id: easy
    description: >
      Detect obvious medical misinformation ("water cures diabetes!")
      and clear policy violations in a health-related post.
    difficulty: easy
    grader: default
    graders: [default]
    grader_id: default
    grader_path: server/grader.py:grade
    score: 0.5
    score_range: [0.001, 0.999]

  - id: medium
    description: >
      Detect subtle regional bias and divisive framing disguised
      as neutral economic analysis in a policy-related post.
    difficulty: medium
    grader: default
    graders: [default]
    grader_id: default
    grader_path: server/grader.py:grade
    score: 0.5
    score_range: [0.001, 0.999]

  - id: hard
    description: >
      Detect multi-layered threats in a fabricated WhatsApp encryption leak
      narrative combining hallucination, bias, manipulation, and fake history.
    difficulty: hard
    grader: default
    graders: [default]
    grader_id: default
    grader_path: server/grader.py:grade
    score: 0.5
    score_range: [0.001, 0.999]

action_space:
  type: object
  fields:
    - hallucination_detected: bool
    - hallucination_explanation: str
    - bias_detected: bool
    - bias_explanation: str
    - alignment_violated: bool
    - alignment_explanation: str
    - memory_consistent: bool
    - memory_explanation: str
    - overall_verdict: "safe | borderline | remove"
    - confidence: float

observation_space:
  type: object
  fields:
    - post_content: str
    - post_author: str
    - post_timestamp: str
    - previous_posts: list[str]
    - ai_analysis: str
    - platform_rules: list[str]
    - task_id: str
    - difficulty: str
    - step_number: int
    - max_steps: int
    - reward: float
    - done: bool

reward_range: [0.001, 0.999]
max_steps: 3