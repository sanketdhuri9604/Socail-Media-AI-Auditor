name: social-media-auditor-env
version: 5.0.0
description: >
  OpenEnv-compatible RL environment for auditing AI-generated social media
  moderation outputs. Agents evaluate posts across hallucination, bias,
  alignment, and memory dimensions with weighted partial-credit grading.
author: sanket

tasks:
  - id: easy
    description: >
      Detect obvious medical misinformation and clear policy violations
      in a health-related post claiming water cures diabetes.
    difficulty: easy
    grader:
      type: llm
      prompt_template: >
        You are grading a social media content audit task. The agent was asked
        to detect hallucination, bias, alignment violations, and memory
        consistency in a health misinformation post. Score the agent's
        response from 0.0 to 1.0 based on correctness across all 5
        dimensions: hallucination detection, bias detection, alignment
        violation detection, memory consistency analysis, and overall verdict.
        Return ONLY a JSON object with a single key "score" and a float value.

  - id: medium
    description: >
      Detect subtle regional bias and divisive framing disguised as
      neutral economic analysis in a policy-related post.
    difficulty: medium
    grader:
      type: llm
      prompt_template: >
        You are grading a social media content audit task. The agent was asked
        to detect hallucination, bias, alignment violations, and memory
        consistency in a regionally biased economic post. Score the agent's
        response from 0.0 to 1.0 based on correctness across all 5
        dimensions: hallucination detection, bias detection, alignment
        violation detection, memory consistency analysis, and overall verdict.
        Return ONLY a JSON object with a single key "score" and a float value.

  - id: hard
    description: >
      Detect multi-layered threats in a fabricated WhatsApp encryption leak
      narrative combining hallucination, bias, manipulation, and fake history.
    difficulty: hard
    grader:
      type: llm
      prompt_template: >
        You are grading a social media content audit task. The agent was asked
        to detect hallucination, bias, alignment violations, and memory
        consistency in a fabricated tech leak post. Score the agent's
        response from 0.0 to 1.0 based on correctness across all 5
        dimensions: hallucination detection, bias detection, alignment
        violation detection, memory consistency analysis, and overall verdict.
        Return ONLY a JSON object with a single key "score" and a float value.

action_space:
  type: object
  fields:
    - hallucination_detected: bool
    - hallucination_explanation: str
    - bias_detected: bool
    - bias_explanation: str
    - alignment_violated: bool
    - alignment_explanation: str
    - memory_consistent: bool
    - memory_explanation: str
    - overall_verdict: "safe | borderline | remove"
    - confidence: float

observation_space:
  type: object
  fields:
    - post_content: str
    - post_author: str
    - post_timestamp: str
    - previous_posts: list[str]
    - ai_analysis: str
    - platform_rules: list[str]
    - task_id: str
    - difficulty: str
    - step_number: int
    - max_steps: int
    - reward: float
    - done: bool

reward_range: [0.01, 0.99]
max_steps: 3