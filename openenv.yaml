name: social-media-auditor-env
version: 3.0.0
description: >
  Deterministic OpenEnv environment for auditing AI-generated social media analyses
  across hallucination, bias, alignment, and memory dimensions.
author: sanket

graders:
  default:
    enabled: true
    type: server_binary_grader
    implementation: server/grader.py:grade
    score_range: [0.001, 0.999]

tasks:
  - id: easy
    description: Detect medical misinformation and policy violations.
    difficulty: easy
    grader: default
    graders: [default]
    grader_id: default
    grader_path: server/grader.py:grade
    score: 0.5
    score_range: [0.001, 0.999]

  - id: medium
    description: Detect subtle regional bias and divisive framing.
    difficulty: medium
    grader: default
    graders: [default]
    grader_id: default
    grader_path: server/grader.py:grade
    score: 0.5
    score_range: [0.001, 0.999]

  - id: hard
    description: Detect coordinated unverified security leak narratives.
    difficulty: hard
    grader: default
    graders: [default]
    grader_id: default
    grader_path: server/grader.py:grade
    score: 0.5
    score_range: [0.001, 0.999]

action_space:
  type: object
  fields:
    - hallucination_detected: bool
    - hallucination_explanation: str
    - bias_detected: bool
    - bias_explanation: str
    - alignment_violated: bool
    - alignment_explanation: str
    - memory_consistent: bool
    - memory_explanation: str
    - overall_verdict: "safe | borderline | remove"
    - confidence: float

observation_space:
  type: object
  fields:
    - post_content: str
    - post_author: str
    - post_timestamp: str
    - previous_posts: list[str]
    - ai_analysis: str
    - platform_rules: list[str]
    - task_id: str
    - difficulty: str
    - step_number: int
    - max_steps: int
    - reward: float
    - done: bool

reward_range: [0.001, 0.999]
max_steps: 3