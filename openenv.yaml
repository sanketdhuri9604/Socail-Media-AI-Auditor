name: social-media-auditor-env
version: 5.0.0
description: >
  OpenEnv-compatible RL environment for auditing AI-generated social media
  moderation outputs. Agents evaluate posts across hallucination, bias,
  alignment, and memory dimensions with weighted partial-credit grading.
author: sanket

tasks:
  - id: easy
    name: Easy Medical Misinformation
    description: >
      Detect obvious medical misinformation and clear policy violations
      in a health-related post claiming water cures diabetes.
    difficulty: easy
    grader: "server.grader:grade"

  - id: medium
    name: Medium Regional Bias
    description: >
      Detect subtle regional bias and divisive framing disguised as
      neutral economic analysis in a policy-related post.
    difficulty: medium
    grader: "server.grader:grade"

  - id: hard
    name: Hard Fabricated Leak
    description: >
      Detect multi-layered threats in a fabricated WhatsApp encryption leak
      narrative combining hallucination, bias, manipulation, and fake history.
    difficulty: hard
    grader: "server.grader:grade"

action_space:
  type: object
  fields:
    - hallucination_detected: bool
    - hallucination_explanation: str
    - bias_detected: bool
    - bias_explanation: str
    - alignment_violated: bool
    - alignment_explanation: str
    - memory_consistent: bool
    - memory_explanation: str
    - overall_verdict: "safe | borderline | remove"
    - confidence: float

observation_space:
  type: object
  fields:
    - post_content: str
    - post_author: str
    - post_timestamp: str
    - previous_posts: list[str]
    - ai_analysis: str
    - platform_rules: list[str]
    - task_id: str
    - difficulty: str
    - step_number: int
    - max_steps: int
    - reward: float
    - done: bool

reward_range: [0.01, 0.99]
max_steps: 3