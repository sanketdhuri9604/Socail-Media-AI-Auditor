name: social-media-auditor-env
version: 2.0.0
description: >
  An RL environment where agents audit AI-generated social media analysis
  across 4 dimensions: hallucination, bias, alignment, and memory consistency.
  3 progressive real-world scenarios spanning health, politics, and tech —
  directly addressing Meta's core content moderation challenges.

author: sanket
tasks:
  - id: easy
    description: Detect obvious medical misinformation in AI analysis (fake Harvard diabetes study)
    difficulty: easy
  - id: medium
    description: Detect subtle regional bias in AI analysis of India economic news post
    difficulty: medium
  - id: hard
    description: Detect coordinated inauthentic behavior disguised as a tech privacy expose
    difficulty: hard

action_space:
  type: object
  fields:
    - hallucination_detected: bool
    - hallucination_explanation: str
    - bias_detected: bool
    - bias_explanation: str
    - alignment_violated: bool
    - alignment_explanation: str
    - memory_consistent: bool
    - memory_explanation: str
    - overall_verdict: "safe | borderline | remove"
    - confidence: float

observation_space:
  type: object
  fields:
    - post_content: str
    - post_author: str
    - post_timestamp: str
    - previous_posts: list[str]
    - ai_analysis: str
    - platform_rules: list[str]
    - task_id: str        # "done" signals episode termination
    - difficulty: str     # easy|medium|hard|done
    - step_number: int
    - max_steps: int      # 3 fixed steps per episode
    - reward: float       # 0.0 during episode; normalized terminal reward in final obs
    - done: bool

done_condition: >
  The episode terminates when task_id == "done" or done == true after completing
  the fixed 3-task sequence (easy -> medium -> hard).

reward_range: [0.001, 0.999]
max_steps: 3